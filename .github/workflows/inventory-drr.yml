name: Inventory DRR Sync

on:
  schedule:
    - cron: "30 2 * * *" # Runs daily at 08:00 IST
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm ci

      - name: Write service account key
        # secrets/ is gitignored, so it doesn't exist on a fresh checkout -- create it first.
        run: |
          mkdir -p secrets
          echo "$GOOGLE_SERVICE_ACCOUNT_KEY" > secrets/service-account.json
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Run inventory/DRR sync
        run: node run.js
        env:
          UNICOMMERCE_TENANT_URL: ${{ secrets.UNICOMMERCE_TENANT_URL }}
          UNICOMMERCE_USERNAME: ${{ secrets.UNICOMMERCE_USERNAME }}
          UNICOMMERCE_API_KEY: ${{ secrets.UNICOMMERCE_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY_PATH: ./secrets/service-account.json
